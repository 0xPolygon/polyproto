syntax = "proto3";

package bor;

import "common/common.proto";

option go_package = "./bor;bor";

service BorApi {
  rpc GetRootHash(GetRootHashRequest) returns (GetRootHashResponse) {}
  rpc GetVoteOnHash(GetVoteOnHashRequest) returns (GetVoteOnHashResponse) {}
  rpc HeaderByNumber(GetHeaderByNumberRequest) returns (GetHeaderByNumberResponse) {}
  rpc BlockByNumber(GetBlockByNumberRequest) returns (GetBlockByNumberResponse) {}
  rpc TransactionReceipt(ReceiptRequest) returns (ReceiptResponse) {}
  rpc BorBlockReceipt(ReceiptRequest) returns (ReceiptResponse) {}
  rpc GetStartBlockHeimdallSpanID(GetStartBlockHeimdallSpanIDRequest) returns (GetStartBlockHeimdallSpanIDResponse) {}
  rpc GetAuthor(GetAuthorRequest) returns (GetAuthorResponse) {}
  rpc GetTdByHash(GetTdByHashRequest) returns (GetTdResponse) {}
  rpc GetTdByNumber(GetTdByNumberRequest) returns (GetTdResponse) {}
  rpc GetBlockInfoInBatch(GetBlockInfoInBatchRequest) returns (GetBlockInfoInBatchResponse) {}
}

message Header {
  uint64 number = 1;
  common.H256 parentHash = 2;
  uint64 time = 3;

  // full raw header
  common.H256 uncleHash = 4;
  common.H160 coinbase = 5;
  common.H256 stateRoot = 6;
  common.H256 txRoot = 7;
  common.H256 receiptRoot = 8;
  bytes bloom = 9;
  bytes difficulty = 10;
  uint64 gasLimit = 11;
  uint64 gasUsed = 12;
  bytes extraData = 13;
  common.H256 mixDigest = 14;
  bytes nonce = 15;

  // optional upgrade fields (zero, empty, nil means nil).
  bytes baseFee = 16;
  common.H256 withdrawalsHash = 17;
  optional uint64 blobGasUsed = 18;
  optional uint64 excessBlobGas = 19;
  common.H256 parentBeaconBlockRoot = 20;
  common.H256 requestsHash = 21;
}

// ---- ROOT HASH ----

message GetRootHashRequest {
  uint64 startBlockNumber = 1;
  uint64 endBlockNumber = 2;
}

message GetRootHashResponse {
  string rootHash = 1;
}

// ---- VOTE ON HASH ----

message GetVoteOnHashRequest {
  uint64 startBlockNumber = 1;
  uint64 endBlockNumber = 2;
  string hash = 3;
  string milestoneId = 4;
}

message GetVoteOnHashResponse {
  bool response = 1;
}

// ---- HEADER BY NUMBER ----

message GetHeaderByNumberRequest {
  string number = 1;
}

message GetHeaderByNumberResponse {
  Header header = 1;
}

// ---- BLOCK BY NUMBER ----

message GetBlockByNumberRequest {
  string number = 1;
}

message GetBlockByNumberResponse {
  Block block = 1;
}

// ---- TRANSACTION RECEIPT ----

message ReceiptRequest {
  common.H256 hash = 1;
}

message ReceiptResponse {
  Receipt receipt = 1;
}

// ---- BLOCK ----
message Block {
  Header header = 1;
}

// ---- BLOCK RECEIPT ----

message Log {
  common.H160 address = 1;
  repeated common.H256 topics = 2;
  bytes data = 3;
  uint64 blockNumber = 4;
  common.H256 txHash = 5;
  uint64 txIndex = 6;
  common.H256 blockHash = 7;
  uint64 index = 8;
  bool removed = 9;
}

message Bloom {
  bytes bloom = 1;
}

message Receipt {
  uint64 type = 1;
  bytes postState = 2;
  uint64 status = 3;
  uint64 cumulativeGasUsed = 4;
  Bloom bloom = 5;
  repeated Log logs = 6;

  common.H256 txHash = 7;
  common.H160 contractAddress = 8;
  uint64 gasUsed = 9;
  int64 effectiveGasPrice = 10;
  uint64 blobGasUsed = 11;
  int64 blobGasPrice = 12;

  common.H256 blockHash = 13;
  int64 blockNumber = 14;
  uint64 transactionIndex = 15;
}

message GetStartBlockHeimdallSpanIDRequest {
  uint64 StartBlock = 1;
}

message GetStartBlockHeimdallSpanIDResponse {
  uint64 StartBlock = 1;
  uint64 HeimdallSpanID = 2;
}

message GetAuthorRequest  { string number = 1; }
message GetAuthorResponse { common.H160 author = 1; }

message GetTdByHashRequest   { common.H256 hash = 1; }
message GetTdByNumberRequest { string number = 1; }
message GetTdResponse        { uint64 totalDifficulty = 1; }

message GetBlockInfoInBatchRequest {
  uint64 startBlockNumber = 1;
  uint64 endBlockNumber   = 2;
}

message BlockInfo {
  Header header = 1;
  uint64 totalDifficulty = 2;
  common.H160 author = 3;
}

message GetBlockInfoInBatchResponse {
  repeated BlockInfo blocks = 1;
}
